# Host the IgiciroHub web app + privacy policy on GitHub Pages.
# iPhone users: open https://isherve.github.io/IgiciroHub/ in Safari and Add to Home Screen.
name: GitHub Pages — Web App

on:
  push:
    branches: [main]
    paths:
      - frontend/**
      - docs/**
      - .github/workflows/pages-app.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build web app
        working-directory: frontend
        env:
          EXPO_PUBLIC_API_URL: https://igicirohub-api.onrender.com
          CI: "1"
        run: |
          npm ci
          npx expo export --platform web

      - name: Add privacy policy page
        run: |
          mkdir -p frontend/dist/privacy
          cp docs/index.html frontend/dist/privacy/index.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - id: deployment
        uses: actions/deploy-pages@v4

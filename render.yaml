# Render Blueprint for the IgiciroHub backend + web app.
services:
  - type: web
    name: igicirohub-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: "bash ./build.sh"
    startCommand: "gunicorn igicirohub.wsgi:application --bind 0.0.0.0:$PORT"
    healthCheckPath: /
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: igicirohub.settings.prod
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "localhost,127.0.0.1"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://igicirohub-api.onrender.com,https://igicirohub-web.onrender.com,https://isherve.github.io"
      - key: DATABASE_URL
        fromDatabase:
          name: igicirohub-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: AT_API_KEY
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false

  - type: web
    name: igicirohub-web
    runtime: static
    rootDir: frontend
    buildCommand: "bash ./render-build.sh"
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: EXPO_PUBLIC_API_URL
        value: https://igicirohub-api.onrender.com

databases:
  - name: igicirohub-db
    plan: free
